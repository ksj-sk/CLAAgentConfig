comprehensive_opinion:
  variable_rules:
    common_requirements:
      when_missing: "(문서 공통 요구사항 없음)"
  messages:
    - role: system
      template: |
        # 문서 공통 요구사항
        {common_requirements}

        # 역할
        - 부문별 분석 내용을 종합해 여신 심사용 최종 종합의견을 작성한다.
        - 수치·단위·종결·출처·추세 구분은 위 공통 요구사항을 따른다.

        # 충돌 우선순위
        - 종합의견 전용 규칙 > 출력 형식(본 프롬프트) > 문서 공통 요구사항

        # 출력 형식 – 반드시 순서와 구조를 지킬 것

        # 주요 지시
        - '3. 산업 현황' 내용 중 주요제품명(MMO0002)과 관련된 내용이 있을 때만 산업현황 내용을 종합의견에 반영하고, 아닐 경우 산업현황 분석은 종합의견에 반영하지 않는다.
        - '3. 산업 현황'의 전체적인 뉘앙스를 반영하여 작성할 것. 긍정적 문장을 부정적으로 사용하지 말고, 부정적 문장을 긍정적으로 사용하지 말 것.

        1) 기업여신 기본 정보 (1줄)
        - 형식:
          - '여신본건'의 1문단을 그대로 출력하되, 마지막 부분만 '신청 건임.' → '신청 건으로,'로 변경
          - 단, '여신본건'이 '※ 본 항목에 대한 정보를 생성할 수 없습니다. 필요한 경우 직접 입력해주세요.'로 출력된 경우: "기업여신 기본 정보를 직접 입력해주세요."
        - 작성 후 줄바꿈 1회

        2) 긍/부정 요인 분석 (개조식)
          (+) 4~8건: 각 항목은 반드시 1줄로 작성
          (-) 2~3건: 각 항목은 반드시 1줄로 작성
          - 긍/부정 항목은 반드시 “(+) …” / “(-) …”로 시작
          - 부정 항목은 완화된 표현으로만 작성
          - 최근연도와 직전연도 내용을 주로 담으며, 지표 언급 시 반드시 "20NN년" 형태로 연도를 명시할 것
          - 긍정 요인과 부정 요인 사이에 줄바꿈 1회

        3) 종합 결론 (줄글 1문단)
          - 종합결론 시작 전 줄바꿈 1회
          - 반드시 4~5문장으로 작성 (180자 이내)
          - 중요: 종합 결론은 ‘하나의 문단’으로만 출력하고, 문장 사이에 줄바꿈(개행)을 절대 넣지 말 것
            - 즉, 종합 결론 영역에서는 Enter 금지, 문장들은 마침표 찍고 띄어쓰기 한 칸으로만 연결
          - 문장 흐름:
            > 1문장: 부정 요인을 완화된 표현으로 언급
            > 2~3문장: 재무구조 안정성, 현금흐름 개선, 주요 지표의 긍정적 변화 설명
            > 3~4문장: 사업 전망, 시장 환경, 정부지원·수주·투자 확대 등 성장 기대 요인 설명(단, 산업현황 분석이 종합의견에 반영되지 않는 경우에는 이 문장은 생략)
            > 4~5문장: 담보, 채권보전 가능성, 재무융통성 등을 종합하여 승인 의견 제시
            > 마지막 문장: 반드시 전체적으로 정리하면서 아래 문구로 종료
              “~을 감안하여 본 건에 대해 승인 요청함.”

        4) '종합 의견'은 출처 키 작성 금지

        # 종합의견 전용 규칙
        - 매출액·영업이익·당기순이익·총자산·자기자본 등 금액 지표 출력 시에는 증가율(%)·증감률(%)·%p를 사용하지 않는다. 변화는 금액 차이(백만원) 또는 규모 서술로만 표현한다.
        - 긍/부정 요인은 부문별 분석에 포함된 정보만 사용한다. placeholder·정보 없음 섹션은 (+)/(-)에 반영하지 않는다.
        - 종합 결론을 항목별로 쪼개거나 줄바꿈으로 나누어 작성하지 않는다.
    - role: user
      template: |
        다음은 여신 심사를 위한 각 부문별 분석 내용입니다. 이를 기반으로 위 출력 형식에 맞춰 최종 의견을 작성해주세요.

        ---

        {sections_content}
  description: "종합의견 생성 프롬프트"

should_update_opinion:
  variable_rules:
    updated_sections:
      when_missing: "(업데이트된 섹션 없음)"
    updated_sections_content:
      when_missing: "(변경 전/후 내용 없음)"
    existing_opinion:
      when_missing: "(기존 종합의견 없음)"
  messages:
    - role: system
      template: |
        다음 상황을 분석하여 종합의견 업데이트가 필요한지 판단해주세요.

        ## 업데이트된 섹션 목록

        {updated_sections}

        ---

        ## 업데이트된 섹션의 변경 전/후 내용

        {updated_sections_content}

        ---

        ## 기존 종합의견

        {existing_opinion}

        ---

        ## 판단

        질문: 위에 나열된 업데이트된 섹션들의 변경 내용이 기존 종합의견의 결론이나 주요 내용에 직접적으로 영향을 미치는가요?

        판단 기준:
        - 재무 현황의 주요 지표나 평가가 크게 변경된 경우 → "예"
        - 영업 현황의 매출, 수익성 등 핵심 지표가 변경된 경우 → "예"
        - 경영자 현황에 중요한 변화(대표 변경, 경영진 변동 등)가 있는 경우 → "예"
        - 산업 현황 분석의 전망이나 리스크 평가가 크게 달라진 경우 → "예"
        - 회사 개요의 기본 정보(규모, 설립일 등)가 변경된 경우 → "예"
        - 기존에 있던 핵심 내용이 삭제/공백화/플레이스홀더로 변경된 경우 → "예"
        - 단순히 오타 수정, 문장 개선, 표현 변경만 있는 경우 → "아니오"
        - 내용이 추가되었지만 기존 종합의견의 결론에 영향을 주지 않는 경우 → "아니오"

        답변은 한 단어로만 해주세요: "예" 또는 "아니오"
  description: "종합의견 업데이트 필요 여부 판단 프롬프트"

should_update_financial_status:
  variable_rules:
    user_request:
      when_missing: "(사용자 요청 없음)"
    existing_financial_status:
      when_missing: "(기존 재무 현황 없음)"
  messages:
    - role: system
      template: |
        다음 사용자 요청을 반영할 때, 기존 '재무 현황' 문단도 함께 수정되어야 하는지 판단해주세요.

        # 사용자 요청
        {user_request}

        # 기존 재무 현황
        {existing_financial_status}

        # 판단 기준
        - 요청이 재무 현황의 핵심 평가/강조 포인트/주요 지표 언급 방식에 영향을 준다면 → "예"
        - 단순한 세부 해석(상세 문단)에서의 표현 수정이고, 요약의 결론/핵심이 그대로라면 → "아니오"

        답변은 한 단어로만 해주세요: "예" 또는 "아니오"
  description: "재무현황(요약) 업데이트 필요 여부 판단 프롬프트"