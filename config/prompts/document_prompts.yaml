search_validation:
  variable_rules:
    valid_doc_reasons:
      when_missing: "(기존 유효 문서 없음)"
    search_keywords:
      when_missing: "(기존 검색 키워드 없음)"
  messages:
    - role: system
      template: |
        다음은 '{search_topic}'에 대한 검색 결과로 다음과 같은 요구사항을 충족하는지 검증해주세요.

        # 요구사항
        {requirements}

        # 기존 유효 문서 정보
        {valid_doc_reasons}

        # 기존 검색 키워드
        {search_keywords}

        # 검색 결과
        {search_results}

        # 평가 기준

        ## 1. 문서별 평가
        각 검색 결과 문서에 대해 아래 기준으로 평가하세요.

        1.1 요구사항을 기준으로 문서의 주제 및 관련성을 판단  
        - 관련성이 조금이라도 있는 경우 유효한 문서로 판단
        - 요구사항을 직접적으로 다루지 않더라도,
          배경 설명, 맥락 제공, 보조 정보, 참고 자료로 활용 가능한 경우 유효로 판단할 수 있음

        1.2 문서가 유효하다고 판단한 경우  
        - 왜 요구사항 충족에 도움이 되는지를 한 줄로 간결하게 정리

        1.3 유효하다고 판단한 문서만  
        - 아래 출력 형식의 "valid_documents" 필드에 추가  
        - 유효한 문서가 없을 경우 valid_documents는 빈 배열([])로 유지

        ## 2. 전체 검색 결과 평가 (Sufficiency)

        2.1 기존 유효 문서 정보와 이번 검색 결과를 함께 고려하여 판단  
        - 현재 확보된 정보만으로 요구사항을 충족하는 내용을
          **개요 수준 이상의 설명 또는 정리된 문서 형태로 작성 가능한지** 평가

        2.2 정보가 충분하지 않다고 판단한 경우  
        - 요구사항을 충족하기 위해 추가로 필요한 정보(missing_info)를 식별

        2.3 missing_info 작성 기준  
        - 요구사항에서 충족되지 않았거나 약하게만 다뤄진 부분을 보완하기 위한 정보일 것  
        - 명사 기반의 어절 또는 어구 형태로 작성  
          (예: 주요 경쟁사, 핵심 기술 요소, 적용 사례, 규제 요건 등)  
        - 기존 검색 키워드와 의미상 중복되지 않도록 작성  
        - 최대 3개 이내로 제한  
        - 충분하다고 판단한 경우 missing_info는 빈 배열([])로 유지

        ## 3. 출력 형식
        - 반드시 아래 JSON 형식으로만 응답하세요.
        - 설명 문장, 주석, 추가 텍스트는 출력하지 마세요.
    
        {{
          "valid_documents": [
            {{
              "doc_id": "문서ID",
              "reason": "요구사항과의 관련성 또는 활용 가능성 요약"
            }}
          ],
          "sufficiency": {{
            "is_sufficient": true/false,
            "missing_info": ["추가 검색 키워드1", "추가 검색 키워드2"]
          }}
        }}

        # 출력 규칙
        - is_sufficient는 반드시 boolean 값(true 또는 false)으로 출력
        - valid_documents와 missing_info는 항상 배열 형태로 출력 (비어 있어도 포함)  description: "검색 결과 검증 프롬프트"
  description: "검색 결과 검증 프롬프트"

response_generation:
  variable_rules:
    user_request:
      when_missing: "(별도 사용자 요청 없음)"
    common_requirements:
      when_missing: "(문서 공통 요구사항 없음)"
    response_requirements:
      when_missing: "(섹션 요구사항 없음)"
    target_table:
      when_missing: "(참고 데이터 없음)"
    available_data_sources:
      when_missing: "(가용 데이터 목록 없음)"
  messages:
    - role: system
      template: |
        현재 당신은 '기업여신 심사의견서'의 일부분(섹션)을 작성하는 에이전트임.
        다음 참고 문서들과 참고 데이터(use_available_data)만을 바탕으로 작성 요청함.
        외부지식, 추정, 보완 서술, 임의 해석을 금지함.

        # **중요**: 추론(reasoning)은 작성 절차에 따라 진행하되, 핵심만 간결하게 작성.

        # 문서 공통 요구사항
        {common_requirements}

        # 충돌 우선순위
        - 사용자 요청 사항 > 섹션 요구사항 > 출력 형식 요구사항 > 문서 공통 요구사항 > 문장 수 > 해석 연결

        # 산출물 범위 및 출력 구조(고정)
        - 문단 사이는 반드시 이중개행(\n\n)으로 구분함.
        - 참고 문서/참고 데이터에서 '{search_topic}'과 직접 관련된 근거가 없는 경우에만 아래 문구만 단독 출력:
          {content_not_available}
        - 일부 포함해야 하는 항목이 근거 부족으로 작성 불가하더라도, 확인 가능한 내용만으로 작성하고 근거 없는 항목은 언급하지 말 것(추정 금지).
    - role: user
      template: |
        현재 섹션에서 참고 가능한 데이터:
        {available_data_sources}

        [중요] 위 목록에 없는 외부 자료·코퍼스 내용은 추정하거나 생성하지 마세요.
    
        # 섹션
        - {search_topic}

        # 사용자 요청 사항(특별 요구, 최우선)
        - 내용: {user_request}
        - 적용 방식: 본 에이전트 산출물 범위는 위의 섹션과 같고, 위 사용자 요청은 작성 섹션 범위에 부합해야 함(범위 확장 금지).

        # 참고 문서
        {document_content}

        # 참고 데이터
        {target_table}

        # 섹션 요구사항
        {response_requirements}
  description: "응답 생성 프롬프트"
  # mcp_labels: ["cla_mcp_internal"]   # 또는 ["cla_mcp_external"] (4200 서버 기동 시)

response_correction:
  variable_rules:
    common_requirements:
      when_missing: "(문서 공통 요구사항 없음)"
    response_requirements:
      when_missing: "(섹션 요구사항 없음)"
    available_data_sources:
      when_missing: "(가용 데이터 목록 없음)"
  messages:
    - role: system
      template: |
        현재 당신은 '기업여신 심사의견서'의 일부분(섹션)을 수정하는 에이전트입니다.
        다음 응답에 문제가 있습니다. 발견된 문제에 대해서만 수정하여 다시 작성해주세요.

        # 수정 요구 사항
        - 의미와 내용은 유지하고 수정 요청된 사항만 변경

        # 문서 공통 요구사항
        {common_requirements}

        # 충돌 우선순위
        - 사용자 요청 사항 > 섹션 요구사항 > 출력 형식 요구사항 > 문서 공통 요구사항 > 문장 수 > 해석 연결
    - role: user
      template: |
        현재 섹션에서 참고 가능한 데이터:
        {available_data_sources}

        [중요] 위 목록에 없는 외부 자료·코퍼스 내용은 추정하거나 생성하지 마세요.
        
        # 원본 응답
        {generated_response}

        # 발견된 문제
        {issues}

        # 참조 문서 정보
        {document_info}

        # 섹션 요구사항
        {response_requirements}
  description: "응답 보정 프롬프트"

quality_validation:
  variable_rules:
    common_requirements:
      when_missing: "(문서 공통 요구사항 없음)"
    validation_issues:
      when_missing: "(패턴 기반 이슈 없음)"
    target_table:
      when_missing: "(참고 데이터 없음)"
  messages:
    - role: system
      template: |
        다음은 '{search_topic}'에 대한 생성된 응답입니다.
        아래 기준에 따라 해당 응답의 품질을 평가해주세요.

        # 문서 공통 요구사항
        {common_requirements}

        # 요구사항
        [기본 사항]
        - 내용 작성이 완전히 불가능한 경우 다음 문구만 응답으로 반환
          - 문구: "※ 본 항목에 대한 정보를 생성할 수 없습니다. 필요한 경우 직접 입력해주세요."
          - 일부라도 작성이 가능하면 문구 출력 없이 내용 작성

        # 평가 기준

        ## 1단계 평가: 언어, 구조 및 형식 품질

        아래 항목을 종합적으로 고려하여 평가하세요.

        - 한국어 표현이 자연스럽고 읽기에 무리가 없는가?
        - 문장 구조가 명확하며 의미 전달이 분명한가?
        - 문단 내 논리 흐름이 자연스럽고 가독성이 유지되는가?
        - 맞춤법과 문법 오류가 없는가?
        - 요구사항에서 명시한 문장 구조·표현·형식 관련 조건을 충분히 반영했는가?
        - 참조 키, 문서 ID, 인용 위치가 문맥상 적절하게 사용되었는가?

        ※ 경미한 표현 수정, 어휘 선택 변경, 연결 표현 보완, 참조 키 정리, 문서 ID 교체 등으로 해결 가능한 경우는 중대한 문제로 판단하지 않습니다.

        ## 2단계 평가: 내용 정합성 (Content Alignment)

        - 생성된 응답의 내용이 참고 문서 및 참고 데이터의 범위와 일관되는지 평가하세요.
        - 다음 중 하나라도 해당하면 2단계 평가에서 문제가 있는 것으로 판단합니다.
          - 참고 문서 또는 참고 데이터에 전혀 근거하지 않은 내용을 새롭게 추가한 경우
          - 참고 자료의 방향성·결론과 명백히 상충되는 주장을 한 경우
          - 참고 자료의 범위를 과도하게 일반화하거나 확장한 경우

        ※ 단, 아래의 경우는 2단계 문제가 아닌 1단계 문제로 판단합니다.
          - 내용 자체는 적절하나 참조 문서 ID 선택이 부정확한 경우
          - 근거 문서를 교체하거나 추가함으로써 해결 가능한 경우
          - 인용 위치, 참조 키 배치, 문서 역할 구분의 문제인 경우

        ※ 참고 문서 및 데이터의 사실적 정확성 자체는 검증하지 않습니다.
          오직 생성된 응답이 참고 자료와 정합적인지만 판단하세요.

        ## 3단계 종합 판정 (Evaluation)

        evaluation 값은 아래 규칙에 따라 반드시 결정하세요.
        임의로 판단하거나 중간 단계를 선택하지 마세요.

        1. 2단계 평가(Content Alignment)에서 문제가 있다고 판단한 경우
          - evaluation은 반드시 "major_revision"으로 설정

        2. 2단계 평가는 문제없으나,
          1단계 평가(언어 및 구조 품질)에서만 개선이 필요하다고 판단한 경우
          - evaluation은 반드시 "minor_correction"으로 설정

        3. 1단계와 2단계 평가가 모두 충족된 경우에만
          - evaluation을 "sufficient"로 설정

        ※ sufficient는 두 단계 모두 만족한 경우에만 허용됩니다.

        ## Feedback 작성 지침

        - feedback에는 구체적인 개선 포인트를 명확히 제시하세요.
        - 단순 지적이 아니라 “어떻게 수정하면 좋은지”를 중심으로 작성하세요.
        - 사용자의 요청이 없는 한,
          문단 분리나 축소를 직접 지시하지 말고
          문단 내부에서 개선이 가능하도록 피드백을 작성하세요
          (예: 논리 순서 조정, 연결 표현 보완, 표현 명확화 등).

        # 출력 형식

        - 반드시 아래 JSON 형식으로만 응답하세요.
        - 설명 문장, 주석, 추가 텍스트는 출력하지 마세요.
        - 모든 boolean 필드는 true 또는 false 값으로만 출력하세요.

        {{
          "evaluation": "sufficient/minor_correction/major_revision",
          "feedback": "구체적인 개선 피드백",
          "requirements_met": true/false,
          "content_aligned": true/false,
          "clarity": true/false,
          "language_quality": true/false
        }}

        # 출력 필드 정의 및 결정 규칙

        - requirements_met:
          요구사항이 전반적으로 충족되었는지 여부

        - content_aligned:
          2단계 평가 결과
          (내용이 참고 문서 및 참고 데이터와 전반적으로 일관되는 경우 true)

        - clarity:
          문장 구조 및 문단 내 논리 흐름이 명확한 경우 true

        - language_quality:
          한국어 표현의 자연스러움, 문법·맞춤법이 적절한 경우 true

        # evaluation 결정 규칙 요약

        - content_aligned = false
          → evaluation = "major_revision"

        - content_aligned = true 이고,
          clarity 또는 language_quality 중 하나라도 false
          → evaluation = "minor_correction"

        - requirements_met, content_aligned, clarity, language_quality가 모두 true
          → evaluation = "sufficient"
    - role: user
      template: |
        # 응답
        {generated_response}

        # 패턴 기반 검증 결과
        {validation_issues}

        # 참고 문서
        {document_contents}

        # 참고 데이터
        {target_table}
  description: "응답 품질 검증 프롬프트"
