mode_determination:
  variable_rules:
    user_request:
      when_missing: "(사용자 요청 없음)"
    topic_name:
      when_missing: "(섹션명 없음)"
  messages:
    - role: system
      template: |
        기존 내용 변경 요청이 있습니다. 다음 사용자 요청을 분석하여 판단해주세요.
    
        사용자 요청: "{user_request}"
        현재 처리 중인 섹션: "{topic_name}"
    
        질문: 이 요청은 기존 내용을 수정하는 것인가요, 아니면 새로운 문서를 검색하여 처음부터 다시 작성하는 것인가요?
    
        판단 절차(Flow):
        1) 새로운 문서 검색 필요 (generation)
           - "다시 작성", "재작성", "새로 작성", "최근 데이터로 작성" 등의 키워드가 포함된 경우
           - 새로운 데이터나 최신 정보를 반영하여 처음부터 다시 작성해야 하는 경우
           - 파일에 변경사항이 있을 경우 (필수)
             * 예: 기반 파일이 삭제/교체/추가되어 기존 내용 유지가 어려운 경우 → generation
        
        2) 새로운 문서 내용 추가 없이 기존 내용만 수정 (correction)
           - 구체적인 수정 내용이 명시된 경우 (예: "설립일을 2007년 11월 23일로 수정", "주소를 서울시 강남구로 변경")
           - 오타, 맞춤법, 표현 수정 등 구체적인 내용이 있는 경우
        
        3) 요청이 구체적이지 않아 처리 불가 (skip)
           - 단순히 "수정", "변경", "교정" 등의 키워드만 있고 구체적인 수정 내용이 없는 경우
           - "설립일 수정", "오타 수정 부탁"처럼 무엇을 어떻게 수정할지 불명확한 경우
           - 다른 섹션을 언급한 경우 (현재 처리 중인 섹션과 다른 섹션 이름이 포함된 경우)
           - 요청이 모호하거나 처리 불가능한 경우
    
        응답 형식: 반드시 아래 JSON 형식으로만 응답하세요.
        {{
          "mode": "generation" | "correction" | "skip",
          "reason": "판단 이유 (skip인 경우에만 필수)"
        }}
    
        예시:
        - generation: {{"mode": "generation"}}
        - correction: {{"mode": "correction"}}
        - skip: {{"mode": "skip", "reason": "요청이 구체적이지 않습니다. 구체적인 수정 내용을 명시해주세요."}}
  description: "처리 모드 결정 프롬프트 (문서 생성 및 재무 분석 공통)"

mode_determination_single:
  variable_rules:
    user_request:
      when_missing: "(사용자 요청 없음)"
    topic_name:
      when_missing: "(섹션명 없음)"
    existing_area_title:
      when_missing: "(영역명 없음)"
    existing_title:
      when_missing: "(섹션 제목 없음)"
    existing_content:
      when_missing: "(기존 섹션 내용 없음)"
  messages:
    - role: system
      template: |
        기존 내용 변경 요청이 있습니다. 다음 사용자 요청을 분석하여 판단해주세요.
    
        **중요**: 판단 절차 기준으로 간략히 추론(reasoning)하여 응답하세요.
    
        사용자 요청: "{user_request}"
        현재 처리 중인 섹션: "{topic_name}"
        현재 처리 중인 섹션 키: "{topic_key}"
    
        [기존 문서 내용(해당 섹션)]
        - 기존 내용 존재 여부: {existing_has_content}
        - 기존 섹션 영역: "{existing_area_title}"
        - 기존 섹션 제목: "{existing_title}"
        - 기존 섹션 내용(트리밍됨, 없으면 빈 문자열):
        {existing_content}
    
        질문: 이 요청은 기존 내용을 수정하는 것인가요, 아니면 새로운 문서를 검색하여 처음부터 다시 작성하는 것인가요?
    
        판단 절차(Flow):
        0) 기존 내용 존재 여부 확인
           - existing_has_content=false 이면: 기존 섹션 내용이 없거나(삭제/비어있음/플레이스홀더) 유효하지 않다고 간주 → generation
    
        1) 새로운 문서 검색 필요 (generation)
           - 새로운 데이터나 최신 정보를 반영하여 처음부터 다시 작성해야 하는 경우
           - 파일에 변경사항이 있을 경우 (필수)
             * 예: 기반 파일이 삭제/교체/추가되어 기존 내용이 사라졌거나 유지가 어려운 경우 → generation
    
        2) 새로운 문서 내용 추가 없이 기존 내용만 수정 (correction)
           - 추가 내용 없이 기존에 존재하는 내용의 수정만으로 요구사항이 적용 가능한 경우 (내용 요약 포함)
           - 구체적인 수정 내용이 명시된 경우
           - 오타, 맞춤법, 표현 수정 등 구체적인 내용이 있는 경우
    
        3) 요청이 구체적이지 않아 처리 불가 (skip)
           - 단순히 "수정", "변경", "교정" 등의 키워드만 있고 구체적인 수정 내용이 없는 경우
           - 무엇을 어떻게 수정할지 불명확한 경우
           - 다른 섹션을 언급한 경우 (현재 처리 중인 섹션과 다른 섹션 이름이 포함된 경우)
           - 요청이 모호하거나 처리 불가능한 경우
    
        매우 중요:
        - 판단 기준의 내용 중 하나라도 부합하면 해당 모드로 설정합니다.
    
        응답 형식: 반드시 아래 JSON 형식으로만 응답하세요.
        {{
          "mode": "generation" | "correction" | "skip",
          "reason": "판단 이유 (skip인 경우에만 필수)"
        }}
    
        예시:
        - generation: {{"mode": "generation"}}
        - correction: {{"mode": "correction"}}
        - skip: {{"mode": "skip", "reason": "요청이 구체적이지 않습니다. 구체적인 수정 내용을 명시해주세요."}}
  description: "처리 모드 결정 프롬프트 (단건)"

mode_determination_batch:
  variable_rules:
    items_json:
      when_missing: "[]"
  messages:
    - role: system
      template: |
        기존 내용 변경 요청이 여러 개 있습니다. 아래 입력 리스트의 각 항목에 대해 처리 모드를 판단해주세요.
    
        **중요**: 판단 절차 기준으로 간략히 추론(reasoning)하여 응답하세요.
    
        입력 항목 리스트(JSON):
        {items_json}
    
        입력 항목 유의사항:
        - 각 항목에는 topic_key/topic_name/user_request 외에 기존 문서 내용 필드가 포함될 수 있습니다.
          (existing_has_content, existing_area_title, existing_title, existing_content, existing_content_length)
        - existing_has_content가 false면 해당 섹션의 기존 내용이 없다고 간주하고 generation을 우선 고려하세요.
        - existing_has_content가 true이고 user_request가 구체적인 수정 지시라면 correction을 우선 고려하세요.
    
        판단 절차(Flow):
        0) 기존 내용 존재 여부 확인
           - existing_has_content=false 이면: 기존 섹션 내용이 없거나(삭제/비어있음/플레이스홀더) 유효하지 않다고 간주 → generation 우선
    
        1) 새로운 문서 검색 필요 (generation)
           - 새로운 데이터나 최신 정보를 반영하여 처음부터 다시 작성해야 하는 경우
           - 파일에 변경사항이 있을 경우 (필수)
             * 예: 기반 파일이 삭제/교체/추가되어 기존 내용이 사라졌거나 유지가 어려운 경우 → generation
    
        2) 새로운 문서 내용 추가 없이 기존 내용만 수정 (correction)
           - 추가 내용 없이 기존에 존재하는 내용의 수정만으로 요구사항이 적용 가능한 경우 (내용 요약 포함)
           - 구체적인 수정 내용이 명시된 경우
           - 오타, 맞춤법, 표현 수정 등 구체적인 내용이 있는 경우
    
        3) 요청이 구체적이지 않아 처리 불가 (skip)
           - 단순히 "수정", "변경", "교정" 등의 키워드만 있고 구체적인 수정 내용이 없는 경우
           - 무엇을 어떻게 수정할지 불명확한 경우
           - 다른 섹션을 언급한 경우 (현재 처리 중인 섹션과 다른 섹션 이름이 포함된 경우)
           - 요청이 모호하거나 처리 불가능한 경우
    
        매우 중요:
        - 판단 기준의 내용 중 하나라도 부합하면 해당 모드로 설정합니다.
        - 입력 리스트의 각 항목에는 "topic_key"가 있습니다.
        -  응답은 입력 리스트의 모든 "topic_key"에 대해 결과를 1개씩 반드시 포함해야 합니다. (누락 금지)
        - 응답은 반드시 JSON 배열 하나만 반환해야 합니다. (설명 문장 금지)
    
        응답 형식(JSON 배열):
        [
          {{ "topic_key": "...", "mode": "generation" | "correction" | "skip", "reason": "skip인 경우에만 필수" }}
        ]
    
        예시:
        [
          {{ "topic_key": "company_overview", "mode": "correction" }},
          {{ "topic_key": "business_status", "mode": "generation" }},
          {{ "topic_key": "industry_status", "mode": "skip", "reason": "요청이 구체적이지 않습니다." }}
        ]
  description: "처리 모드 결정 프롬프트 (배치)"

