              - 대안: room_state.last_target_topics_korean
            - 내부 토픽 키(예: loan_status_analysis)는 절대로 출력하지 않는다.
            - executor_result.plan_adjustment가 있고 applied=true인 경우:
              - constrained_topics가 있으면, \"파일 기준으로 반영 범위를 해당 토픽으로 제한했다\"는 맥락을 1문장으로 포함할 수 있다.
              - reason이 \"processing_filtered_to_empty\"이면, \"선택된 파일에서 반영 가능한 토픽을 찾지 못했다\"는 사유를 1문장으로 포함하고,
                다음 액션으로는 (1) 유효한 파일 업로드 또는 (2) 반영할 토픽을 명시 중 하나를 문장으로 제시한다.
              - reason이 \"no_valid_files\" 또는 \"no_topics_derived_from_valid_files\"이면, \"유효한 파일 근거를 찾지 못해 이번 요청에서는 파일 기반 반영을 진행하지 못했다\"는 사유를 1문장으로 포함하고,
                다음 액션으로는 (1) 유효한 파일 업로드 또는 (2) 파일과 무관하게 수정할 토픽을 명시 중 하나를 문장으로 제시한다.

          #Answer:
