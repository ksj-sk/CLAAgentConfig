prompt: |
  <task>
  주어진 여러 테이블의 내용에 적합한 제목을 각각 추출해야 합니다.
  </task>

  <input>
  다음은 처리해야 할 테이블 목록입니다:
  
  {tables_data}
  
  각 테이블은 [테이블 번호]로 시작하며, 제목과 내용으로 구성되어 있습니다.
  </input>

  <condition>
  각 테이블에 대해 주어진 그룹 중에서 적합한 그룹를 1개씩 추출해야 합니다.
  </condition>

  <group list>
  1. 분기별 매출 현황
  2. 주요 매입처별 현황
  3. 주요 매출처별 현황
  4. 품목별 매출 현황
  5. 지분 구조
  6. 조직 및 인력 현황
  7. 기타 추가요청 자료
  </group list>

  <classification standard example>
  1. 분기별 매출 현황
  - 기준: 특정 시점(분기) 기준의 매출 추세·계절성 분석
  - 제목: 분기별 매출현황, 분기별 매출 현황, 분기별 매출 구성 현황

  2. 주요 매입처별 현황
  - 기준: 공급망·소싱 구조 분석, 매입처 집중도 및 리스크 평가
  - 제목: 거래처별 매입 현황, 매입처별 매입 현황(국내), 수입처별 매입 현황(국외), 수출처별 매입 현황(국외), 매입처별 매입현황

  3. 주요 매출처별 현황
  - 기준: 고객사 기반 분석, 매출 집중도·거래처 다변화 파악
  - 제목: 거래처별 매출 현황, 주요 매출처별 매출액 현황, 판매처별 매출 현황, 매출처별 매출현황

  4. 품목별 매출 현황
  - 제목: 품목별 매출현황, 주요 품목별 매출 현황
  - 기준: 품목 단위 제품 구조 분석, 주력상품 파악

  5. 지분 구조
  - 기준: 지배구조 변화 및 해외법인 관리 분석
  - 제목: 지분 구조, 베트남법인 지분 변동 현황, 지분 변동 현황
  
  6. 조직 및 인력 현황
  - 기준: 인력 규모·구성·전문의 인력 현황 분석
  - 제목: 인원현황, 월별 직원수 추이, 진료과목별 전문의 현황, 의료진 현황
  
  7. 기타 추가요청 자료
  - 기준: 1~6번에 포함되지 않는 모든 자료
  - 제목: 수입실적 및 신용장 비중현황, 신용장 개설현황, 연지급 LC 한도 산출, 계약현황, 수주(계약) 진행 및 예정건 현황, \n
    영업 수주·계약 예정 현황, 선대현황, 연도별 수입지출 현황, 수입 지출 내역, 대출현황, 관계사 보유자산 현황 (부동산 및 특허권), \n
    임대계약현황, 보유자산, 주주, 보증 현황, 감가상각 집계표 등 그외 모든 자료
  
  </classification standard example>

  <output>
  반드시 다음 JSON 배열 형태로 출력해야 합니다:
  [
    {{
        "group_name": "첫 번째 테이블의 그룹명",
        "reason": "첫 번째 테이블의 그룹명 추출 이유"
    }},
    {{
        "group_name": "두 번째 테이블의 그룹명",
        "reason": "두 번째 테이블의 그룹명 추출 이유"
    }},
    ...
  ]

  각 테이블에 대해 순서대로 결과를 반환하세요. 반드시 유효한 JSON 배열 형식으로만 출력하세요. 다른 텍스트는 포함하지 마세요.
  </output>