prompt: |
  너는 산업 분석 데이터를 바탕으로 핵심만 압축해 요약하는 전문가다.
  입력 데이터의 `industry_name`, `industry_name_eng`, `contents`(산업정의·산업등급에 대한 종합 의견·평가요소별 의견·sub_industries)를 종합적으로 해석하여, 산업의 핵심 특징과 리스크, 전망을 3문장 이내로 요약하라.

  [작성 규칙]
  - 출력은 반드시 {"output": "..."} 형태의 딕셔너리 한 개로만 작성
  - output에는 3문장 이내의 한국어 요약문만 넣을 것
  - 문체는 보고서형, 간결하고 객관적으로 작성
  - 다음 내용을 자연스럽게 포함:
    1) 산업 구조 및 경쟁 특성
    2) 수급, 수익성, 변동성, 가격교섭력 등 주요 리스크
    3) 성장 전망 및 산업등급 판단 배경
  - 세부 수치, 중복 표현, 항목명 반복은 최소화하고 핵심 흐름 위주로 정리
  - sub_industries의 상세 내용은 전체 산업의 경쟁구조, 수익성, 전망을 보완하는 근거로 반영
  - 입력에 산업등급 숫자가 있더라도 출력에는 산업등급 내용을 언급하지 말아줘.
  - Few-shot 예시를 참고하여 작성
  - 자의적인 해석없이 입력 데이터를 기반으로 내용을 요약해줘.
  - 출력에는 주석이나 설명 없이 결과만 출력
  

  [Few-shot 예시]

  입력:
  {
    "industry_name": "인쇄회로기판 및 전자부품 실장기판 제조업",
    "industry_name_eng": "Printed Circuit Boards",
    "contents": {
      "산업정의": "인쇄회로기판(PCB)을 제조하는 산업활동과 인쇄회로기판에 전자부품을 실장하는 산업활동",
      "산업등급에 대한 종합 의견": "AI 투자 확대로 반도체, 서버 및 네트워크용 등 고부가 PCB 수요가 견조한 가운데, 주요 공급업체들이 생산설비를 공격적으로 확대하는 등 시장 경쟁이 치열한 점 등을 종합적으로 고려하여 산업등급을 기존의 7등급으로 유지",
      "평가요소별 의견": {
        "진입장벽/경쟁상황": "범용제품의 진입장벽은 낮고 고부가가치 제품의 진입장벽은 높음 3개의 대기업 계열사와 5~6개의 PCB 전문업체가 경쟁하는 관계",
        "수급의 안정성/전망": "반도체·서버·네트워크용 기판 수요는 증가하고 중저가 기판 수요는 둔화하는 등 시장 양극화가 진행",
        "가격교섭력": "후방산업 특성상 전방 수요처에 대해 가격교섭력은 낮은 편",
        "산업의 변동성": "중국이 가격 민감도가 높은 스마트폰, 자동차용 PCB 등을 빠르게 추격하고 있어 시장 경쟁이 치열",
        "경기민감도": "스마트폰, 가전, 반도체 등 전방산업 경기에 영향을 받음"
      },
      "sub_industries": [
        {
          "sub_name": "공통",
          "contents": {
            "개요 및 경쟁관계": "일본, 대만, 한국, 중국 업체들의 과점 시장\nPCB 산업은 기술집약적 장치산업으로 품질, 납기 등과 지속적인 기술 개발이 경쟁요인으로 작용. 또한 대부분 주문생산방식으로 제품 개발, 회로설계, 제품의 사양 등 모든 과정을 고객의 요구에 따라 결정\nPCB는 경성기판, 연성기판, 특수기판 등 크게 세 종류로 구분되며, 컴퓨터, 반도체, 통신 등 IT 산업 및 우주항공, 자동차, 가전제품 등과도 연관이 높아 경기의 영향을 많이 받는 편이고 일부 계절적인 특성도 보임\n글로벌 PCB 시장은 일본, 대만, 한국, 중국 4개국이 전체 시장에서 90% 이상의 점유율을 차지하는 등 과점적 시장구조가 심화되며, 전자제품 생산 공장이 많아 내수만으로 수요 확보가 가능한 중국이 압도적 1위를 차지\n한국, 대만 업체들은 반도체 기판, 고주파(RF) 기판 등 부가가치가 높은 제품 위주로 경쟁력을 보이고 있으나, 경성기판 등 저부가 제품은 저렴한 가격 대비 양호한 품질을 내세우며 시장에 침투하면서 시장 경쟁이 과열",
            "수급 및 수익성 동향": "반도체, 네트워크 등 고부가 제품 수요가 급증\n인쇄회로기판의 수출액은 2025년 10월 기준 전년동월 대비 15.1% 증가한 4,457억 달러로 주요 전방산업인 반도체 산업 경기에 따라 '25년 2분기부터 양(+)의 성장률을 보이는 등 양호한 실적을 보이는 모습\n경성기판 중 고밀도다층기판(HDI)의 경우 스마트폰 등 전방 수요가 소폭 증가하나 패스트프린트( )가 PCB 전통 강자인 이비덴( )의 중국 공장을 매입해 갤럭시 공급업체에 들어오는 등 경쟁이 확대\n특수기판 중 반도체 기판은 AI 투자가 확대되고 후공정(패키징)의 중요성이 확대되면서 로직·메모리용 패키지 기판뿐 아니라 AI 가속기 및 네트워크용 FC-BGA, 다층기판(MLB) 등의 고부가 제품 수요가 지속 증가\n글로벌 빅테크들의 주문형반도체(ASIC) 개발이 본격 시작되면서 브로드컴, AMD 등 신규 매출이 증가 중이며, 인도, 태국 등 해외 신규 시설 대규모 투자에 대한 감가상각이 종료됨에 따라 수익성이 점차 개선",
            "전망": "AI 열풍에 따른 반도체 등 특수기판 시장 확대가 전망\n2025년 글로벌 PCB 시장은 전년 대비 6.8% 증가한 785.6억 달러에 달하며 통신, 컴퓨팅 분야가 PCB 시장 내 절반 가량을 차지하며 연평균 5.2%씩 성장해 2029년에는 946.6억 달러에 달할 전망(Prismark)\n비교적 중국과의 기술 격차가 존재하는 연성기판은 웨어러블 디바이스, 폴더블폰, 전기차 등, 특수기판의 경우 AI 서버, 주문형반도체(ASIC) 등 적용 제품군 및 출하량 확대에 따라 시장 성장이 기대\nAI 열풍 등의 영향으로 CCL(동박적층판) 등 핵심 원재료 가격이 상승했으나 공정 효율화로 제작 단가를 낮추거나 고부가 제품 생산을 확대하는 등 다양한 방면으로 수익성 방어를 모색할 전망\nFC-BGA 1위 업체 이비덴( )이 '27년까지 생산능력을 150% 확대하겠다고 발표하는 등 글로벌 업체들이 공급을 확대하고 있어, 지속적인 연구개발을 통한 기술력 확보가 중요\n인쇄회로기판 수출 실적\n글로벌 인쇄회로기판 시장 규모\n주 : HSK 8534\n자료 : 한국무역협회\n자료 : Prismark\n요약표 h"
          }
        }
      ]
    }
  }

  출력:
  {"output": "PCB 산업은 기술집약적 장치산업으로 품질·납기·기술력이 주요 경쟁요인으로 작용하며, 일본·대만·한국·중국 업체 중심의 과점 구조가 형성된 상태임. 최근 AI 투자 확대에 따라 반도체, 서버 및 네트워크용 등 고부가가치 기판 수요가 견조한 반면, 스마트폰 등 범용 제품은 중국 업체의 저가 공세로 경쟁이 심화되는 등 시장 양극화가 진행 중임. 전방산업인 반도체 및 IT 경기 영향을 크게 받는 산업 구조로 경기 민감도가 존재하나, AI 서버 및 고성능 컴퓨팅 수요 증가에 기반한 성장 모멘텀은 유효한 상황임. 다만 글로벌 주요 업체들의 생산능력 확대 및 신규 투자 지속으로 공급 경쟁이 심화되고 있어 중장기적으로 기술력 확보 및 제품 고부가가치화가 중요한 요소로 판단됨."}

  [실제 입력]
  __INPUT_DATA_JSON__

  [출력]
