stockholders:
  topic: 주주 현황
  area: 주요조사내용
  required: true
  use_for_opinion: false
  base_keywords:
    - 이하 "당사" 주주 구성
    - 최대주주
    - 주요 주주 현황
    - 주주구성
  corpus_presets:
    - required_input
    - required_input_cr
  parser: core_mapped
  parser_config:
    nested_format: markdown_table
    include_keys:
      - MMO0009
      - MMO0010
      - MMO0011
      - MMO0012
      - MMO0013
      - MMO0014
  requirements: |
    ## 산출물 구조(고정)
    - 구분, 주주명, 주식수, 지분율, 자본금, 비고 등을 정리하여 markdown table 작성
      - 변동사항이 없으면 당기/전기 등 구분하지 않을 것
      - 주식수, 지분율 등의 합계를 표에 추가
    - 비고에 대표이사를 표시하고, 기타 특이사항이 있으면 기재
    - 표의 모든 정보는 참조문서에 근거한 내용만 사용(임의 작성 금지)
     > 여러 표에서의 내용을 조합하지 말 것

    ## 작성 절차
    1) 참조문서에서 주주 현황/구성/변동 사항을 확인
    2) 확인 가능한 항목만 markdown table로 정리(임의 작성 금지)
    3) 표의 마지막 행 끝에 두 번 개행(\n\n) 후 출처키 부착(공통 규칙 준수)

    ## 최종 검증 체크리스트(반드시 수행)
    - markdown table 형식인지 확인
    - 주주현황 및 구성, 변동사항에 대한 정보 외의 내용이 추가되지 않았는지 확인
    - 참조문서 근거 없이 임의로 추가된 주주/지분 정보가 없는지 확인
    - 출처키가 표 마지막 행 끝에 두 번 개행(\n\n) 후 있고 정규형([^D..][^D..])인지 확인


