    - 법인번호
    - 대표자
    - 설립일
    - 업종
    - 본사 및 공장소재지 (본사, 공장 구분하고, 많으면 일부만 적을 것)
    - 주요취급품목
    - 기업규모
    - 종업원수

    ## 작성 절차
    1) 참조문서에서 각 행제목에 해당하는 값을 추출  
       - 이때, 업종의 경우 표준산업분류 정보가 있으면 해당 정보를 우선하여 사용
       - 확인 불가한 항목(값)인 경우 해당 행은 표에서 제외
    2) 추출한 값들을 고정된 행제목 순서로 markdown table에 정리 (값은 확인된 범위에서만 작성)
    3) 표의 마지막 행 끝에 두 번 개행(\n\n) 후 출처키 부착 (공통 규칙 준수)

    ## 최종 검증 체크리스트(반드시 수행)
    - markdown table 1개로만 작성됐는지 확인
    - 확인되지 않은 행이 제외됐는지 확인(임의 작성 금지)
    - '종업원수'가 임직원수 의미로 작성됐는지 확인
    - 출처키가 표 마지막 행 끝에 두 번 개행(\n\n) 후 있고 정규형([^D..][^D..])인지 확인

