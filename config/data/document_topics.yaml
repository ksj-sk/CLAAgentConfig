R&D_status:
  topic: 연구개발 현황
  area: 주요조사내용
  required: false
  use_for_opinion: true
  base_keywords:
    - 연구개발(R&D) 현황
    - 연구개발비
    - 연구개발 실적
    - 연구소
  requirements: |
    ## 산출물 구조(고정)
    - 첫 문단에 연구개발 현황 및 개요 간단히 작성
    - 연구개발 현황, 연구개발 내역, 정부과제 수행 내역 등은 각각 markdown table로 작성 (있는 정보만 작성)
    - 비용을 작성할 경우, 반드시 합계도 작성할 것
    - 재료비, 인건비, 연구개발비/매출액 비율 등 내용도 있으면 작성할 것(연도별 금액 명확히 작성할 것)

    ## 포함/누락 규칙
    - 연구인력 숫자는 명확히 확인되는 경우에만 작성
    - 최근 사업연도의 개발 및 수행 내역은 3~4가지만 작성하고, 각 표 위에 각 표에 대해 이해하기 쉽게 작성하되, 같은 내용을 반복하지 말 것(불확실한 경우 작성하지 않음)
    - 비용 관련 내용은 당기/전기(연도) 등 시기별로 다른 지표를 혼용하지 말 것
      > 당기/전기(연도) 등 시기별로 어떤 지표를 썼는지 표에 명시할 것
    - 사업연도/부문/성과/내용 등은 간략하지만 명확히 작성할 것

    ## 작성 규칙
    - 연결재무제표 내용은 절대 사용하지 말 것
    - 주석 내 회계정책 설명 및 일반 기준 설명은 근거로 사용하지 말 것
    - 각기 다른 표에 있는 수치들을 연산하지 말 것
    - 명시적 수치 외 의미 해석, 구조 변화, 전략 변화 서술 금지

    ## 단위 규칙(엄수)
    - 반드시 검색된 표 상단에 기재된 단위를 보고 작성
    - 금액 단위가 '원' 또는 '천원'인 경우, 반드시 '백만원' 단위로 환산하여 작성
    - 환산 절차는 다음을 따름
      1) '원' 금액일 경우 1,000,000으로 나눔. '천원' 금액일 경우 1,000으로 나눔.
      2) 계산 결과는 소수점 첫째 자리에서 반올림하여 정수로 만듦.
      3) 최종 결과에만 '백만원' 단위를 붙임.
    - 소수점은 절대 표기하지 않음.
    - 환산 전 단위(원, 천원)는 절대 출력하지 않음
    - 환산 과정, 중간값, 원본값 절대 출력 금지
    - ‘≈’, ‘약’, ‘( )’, ‘기준’, ‘수준’ 등 보조 표현 절대 금지
    - 하나의 금액에 복수 단위를 병기하는 행위 절대 금지

    ### 환산 예시
    - 9,007,769천원 → 9,008백만원
    - 1,552,230천원 → 1,552백만원
    - 2,143,355,620원 → 2,143백만원

    ## 작성 절차
    1) 참조문서에서 연구개발/연구소/연구개발비/연구인력 정보를 확인
    2) 연구개발 현황, 연구개발 내역, 정부과제 수행 내역 등은 각각 markdown table로 작성
     > table 이름은 작성하지 않음
    3) 연구인력은 명확히 확인되는 경우에만 기재
    4) 금액은 백만원 단위로 작성. 필요 시 기존 단위를 백만원으로 환산(소수점 금지)
    5) 공통 규칙 준수하여 문단과 표의 출처키 부착

    ## 최종 검증 체크리스트(반드시 수행)
    - 연구개발 현황, 연구개발 내역, 정부과제 수행 내역 등이 markdown table로 포함됐는지 확인 (있는 정보만 작성)
    - 연구인력 수가 근거 없이 임의로 작성되지 않았는지 확인
    - 금액 단위가 백만원이며, 환산 시 소수점 없이 정수로 작성됐는지 확인
    - 사업연도/부문/성과/내용 등은 명확히 작성되었는지 확인
    - markdown table의 셀 내 줄바꿈은 <br> 태그로 정확히 표시되었는지 확인
    - 출처키가 허용 위치("문단 끝"/"표 마지막 행 두 번 개행(\n\n) 후")만 사용되고 정규형([^D..][^D..])인지 확인


