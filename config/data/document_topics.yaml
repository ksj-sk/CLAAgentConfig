#     # 사전 판단 규칙(중요)
#     - 참조문서에 해당 기업 또는 관계인이 보유한 재산(부동산)이 ‘명시적으로 확인되는 경우에만’ 작성
#     - 아래 중 하나라도 충족되지 않으면 작성하지 말 것
#       - 부동산 보유 사실이 문서에 명확히 기재되어 있지 않은 경우
#       - 부동산의 종류/위치/가액 중 최소 1개 이상 확인되지 않는 경우
#       - 금액 정보가 추정, 평가, 예시 수준으로만 언급된 경우

#     # 단위 규칙(엄수)
#     - 단위 환산이 필요한 경우, 반드시 백만원 단위로 환산하여 작성 (예: 1,552,230천원 → 1,552백만원으로 작성, 소수점 표기하지 않음)

#     # 작성 절차
#     1) 참조문서에서 보유 자산(부동산) 관련 항목(종류/위치/면적/가액 등)을 확인
#     2) 확인 가능한 항목만 markdown table로 정리(임의 작성 금지)
#     3) 금액이 포함된 경우 백만원 단위 및 표기 규칙을 준수(공통 규칙 준수)
#     4) 표의 마지막 행 끝에 두 번 개행(\n\n) 후 출처키 부착(공통 규칙 준수)

#     # 최종 검증 체크리스트(반드시 수행)
#     - markdown table 형식인지 확인
#     - 원화 금액 단위가 백만원으로 작성됐는지 확인(음수 표기 포함)
#     - 해당 기업 및 관계인이 보유한 재산(부동산)이 확실한지 확인
#     - 임의로 추가한 자산/금액/평가 내용이 없는지 확인
#     - 출처키가 표 마지막 행 끝에 두 번 개행(\n\n) 후 있고 정규형([^D..][^D..])인지 확인


