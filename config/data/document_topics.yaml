management_analysis:
  topic: 회사 대표(경영자) 분석
  area: 영업점장의견
  required: true
  use_for_opinion: true
  base_keywords:
    - 대표이사(CEO) 프로필
    - 임원(경영진) 경력
    - 최대주주 및 특수관계인
  corpus_presets: 
    - required_input_cr
  parser: core_mapped
  parser_config:
    nested_format: markdown_table
    include_keys:
      - MMO0004
  requirements: |
    ## 산출물 구조(고정)
    - 제목 없이 줄글 2문장으로 작성 (명사형 종결어미로 작성하고 마침표 포함)

    ## 포함해야 할 내용
    - 아래 항목은 '가능한 범위 내 포함'이며, 참고 문서/데이터에 근거가 없는 항목은 언급하지 않음(추정 금지).
      - 대표이사 프로필
      - 경영 철학 및 비전 (내용이 확인되지 않으면 생략 가능)
      - 경영진의 지분 현황 및 경영권 안정성

    ## 용어 사용 규칙
     - "지배자"라는 표현 사용 금지
     - 지배구조 관련 표현은 아래 중 하나로만 사용:
       최대주주 / 실질적 지배주주 / 경영을 총괄
     - "대표이사"는 해당 위치에서만 1회 사용

    ## 단위 규칙(엄수)
    - 금액 단위가 '원' 또는 '천원'인 경우, 반드시 '백만원' 단위로 환산하여 작성
    - 환산 절차는 다음을 반드시 따름
      1) '원' 금액은 1,000,000으로 나눔.
      2) '천원' 금액은 1,000으로 나눔.
      3) 계산 결과는 소수점 첫째 자리에서 반올림하여 정수로 만듦.
      4) 최종 결과에만 '백만원' 단위를 붙임.
    - 소수점은 절대 표기하지 않음.
    - 숫자 값에 단위만 변경하는 방식의 환산은 절대 허용하지 않음.

    ### 환산 예시
    - 9,007,769원 → 9백만원
    - 9,007,769천원 → 9,008백만원
    - 1,552,230천원 → 1,552백만원
    - 2,143,355,620원 → 2,143백만원

    ## 작성 절차
    1) 체크리스트 항목 중 근거가 확인되는 내용만 선별(확인되지 않으면 생략)
    2) 2문장 안에서 핵심만 연결하여 작성하고 문단 끝에 출처키 부착(공통 규칙 준수)

    ## 최종 검증 체크리스트(반드시 수행)
    - 제목 없이 1~2문장인지 확인 (명사형 종결어미로 작성됐는지 확인)
    - 확인되지 않은 정보(추정/임의 보완)가 포함되지 않았는지 확인
    - 출처키가 문단 끝에만 있고 정규형([^D..][^D..])인지 확인

