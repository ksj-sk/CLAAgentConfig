## 공통 (기본)

common:
  topic: 공통
  area: common
  base_keywords: []
  requirements: |
    ## 작성 문서 형식
    - Markdown 형식으로 작성
    - 제목 태그(#) 사용 금지

    ## 수치·단위 및 표기 규칙(공통, 엄수)
    - 숫자는 반드시 천 단위 콤마(,)를 포함하여 출력할 것  (예: 27565백만원 → 27,565백만원)
    - 반드시 원화 금액 단위는 백만원, 미국 달러 단위는 천미불, 비율·회전율 단위는 %를 사용 및 인식하여 작성. (예: 1,100,000백만원, 50천미불, 10.4% 등)
    - 반드시 비율/배율 표기는 소수점 둘째자리에서 반올림하여 첫째자리까지 표기. (예: 44.21% → 44.2%, 3.56배 → 3.6배 등)
    - 비율 지표의 변화량은 반드시 "현재값 - 전년값"으로 계산한 절대값 차이(%p)만 사용
    - 이자보상배율, 차입금/EBITDA, 총자산회전율 등 배율지표의 전년 대비 변화량 및 업종평균의 대비 차이에는 단위를 사용하지 않는다. (예: '이자보상배율은 전년 1.3배에서 0.2 상승한 1.5배를 기록', '업계평균 6.4배 대비 0.4 낮음')
    - 반드시 항목명과 숫자 사이는 한 칸 띄우고, 숫자와 단위(%, 백만원 등) 사이는 붙여서 출력할 것. (예: ‘차입금의존도 57.5%가', ‘총차입금 38,901백만원이며’ 형태로 작성.)
    - 음수는 '-'로 표기
      예) 영업이익 -519백만원
    - 금액이 나열될 때는 연결어미 없이 쉼표로만 나열
      예) 자기자본 2,967백만원, 매출액 17,996백만원, 영업이익 -519백만원
    - 연도는 반드시 "20NN년" 형태로 연도를 명시할 것 (예: 2024년)
    - EBITDA가 0 이하인 경우 차입금/EBITDA의 증감률·차이값 계산은 수행하지 않을 것

    ## 문장 종결 및 문법 규칙(엄수)
    - 문장 종결('.') 시에는 다음 어미패턴(~ㅁ, ~음, ~임, ~함, 필요, ~큼, ~됨 등)을 사용
      > 종결 패턴 활용(~을/를 제공함., ~을/를 수행함., ~ 구조임., ~ 중심 사업임., ~ 기반 서비스 운영함., ~ 형태의 사업 구조임. 등)
      > 회사 개요 전체 문단에 한해 서술형 종결 사용 가능 (문장 단위 판단 금지)
        예) 두고 있습니다. → 두고 있음.
    - (중요) 동일 문장 내 "~함/~임/~됨" 등 명사형 종결 중복 사용 금지
    - 서술어 뒤에 기계적으로 ~임, ~함을 붙이지 말 것

    ## 참조 문서 키(출처) 규칙(공통, 엄수)
    ### 표기 위치(허용 위치 2곳만)
    1) 각 문단의 마지막 문장 바로 뒤(문단 끝)
    2) 표의 마지막 행 뒤에 두 번 줄바꿈(\n\n) 후 출처키 부착

    ### 중복허용 규칙
    - 동일한 출처 문서에서 가져온 정보라면 각 문단과 표 출처로 동일한 출처키 부착 가능

    ### 정규형(허용 형식) — 반드시 이 형식만 사용
    - 문단 마지막 마침표 뒤 공백 1칸 후, 문서ID별로 개별 키를 연속 부착(공백 없음)
      예) ...임. [^D1][^D3]
    - 표의 마지막 행 뒤에 두 번 줄바꿈(\n\n) 후 출처키 부착
      예) | ... | ... |

          [^D1][^D3]

    ### 금지 형식
    - [^{D1 D3}]처럼 중괄호 포함
    - 마침표 전에 출처를 표기 (예: ...임[^D1][^D3].)
    - 하나의 대괄호 안에 복수 문서ID를 공백/쉼표로 묶는 방식
    - 본문 문장 중간에 삽입
    - 표 아래 별도 문단으로 분리

    ## 데이터 사용 원칙(공통)
    - 참고 문서 및 참고 데이터에 있는 정보만 사용하며, 추가 정보 생성 금지.
    - 각종 용어 및 회사명은 원문에 있는대로 사용.
    - 괄호 표기는 가능하나 지양한다. 단, 표/개조식/보조 표기에서는 허용한다.
    - 해석의 중심은 최신연도(제공 데이터 중 가장 최근 연도)와 직전연도 비교에 둔다.
    - "지속 증가", "지속 감소", "증가세", "감소세", "추세", "회복세", "개선세", "악화 추이" 등 방향성을 포함한 추세 표현은 반드시 2개년 이하 변화일 경우 사용 금지
    - 직전연도 대비 증감(2개년 비교) 설명은 추세 표현과 구분하여 허용한다.

## 엉업점장 의견

company_overview:
  topic: 회사 개요
  area: 영업점장의견
  required: true
  use_for_opinion: true
  base_keywords:
    - 이하 "당사" 신설 설립 법인 주요 주주 구성
    - 기업규모(대기업, 중견기업, 중소기업) 해당
    - 회사 설립일 및 명칭 표기, 주소
    - 당사의 주력사업 영위
    - 본사 및 공장 소재지
    - 종업원 현황
    - 설립, 주요사업, 본사소재지
  use_available_data: true
  corpus_presets: 
    - required_input
    - required_input_cl
    - required_input_cr
  parser: core_mapped
  parser_config:
    nested_format: markdown_table
    include_keys:
      - custNm
      - MMO0001
      - MMO0002
      - MMO0003
      - MMO0006
      - MMO0007
      - MMO0008
      - MMO0847
      - MMO0848
  requirements: |
    ## 0. 필드 스키마(추출 대상)
    아래 필드를 참고 문서 및 참고 데이터에서 추출하라. 값이 없으면 NULL로 둘 것.
    - 기업이름
    - 설립년월일
    - 업종
    - 사업목적: 간략히 작성
    - 주소
    - 임직원수
    - 기업규모: 반드시 "외감/비외감" + "중소기업/중견기업/대기업"을 함께 포함한 단일 문자열(예: 외감 중소기업)
    - 재무(원화, 백만원): 자산총계, 자본총계, 매출액, 영업이익, 당기순이익
      * 재무는 use_available_data에서만 가져오며, 제공된 수치의 검증/추정/재계산 금지
      * 제공된 수치 중 '최근 연도 값'만 사용
      * use_available_data에 재무 수치가 없으면 재무 5개 항목은 전부 생략해야 함

    ## 1. 1문단 작성 규칙('회사 개요'에만 특화하여 엄수)
    ### 0) 적용 기준
    - 문장은 조건에 따라 기본정보 또는 재무정보 또는 규모정보까지 포함하여 완결된 형태로 작성한다.
    - 기업이름, 업종은 항상 존재한다.

    ### 1) 문장 구성 원칙
    #### 1단계: 기본정보 문장
      → "{기업이름}는/은 [설립년월일] {업종}을 목적으로 설립된 기업으로, [주소]에 위치함."
    - 설립년월일이 없으면 해당 위치에서 값만 제거한다.
    - 주소가 없으면 ", [주소]에 위치함" 부분만 제거하되, 재무 및 규모정보도 없으면 '기업으로,'를 '기업임.'으로 변경.
    - 문장 골격("설립된 기업으로")은 절대 제거하지 않는다.

    #### 2단계: 재무 및 규모정보 반영
    - 재무정보가 존재하는 경우 반드시 아래 규칙 중 하나를 선택하여 문장을 작성한다.
    - 1단계 문장 뒤에 재무/규모 문장을 이어서 하나의 문단으로 작성한다.
    - 연도(20NN년말)는 데이터를 가져온 최근 연도를 작성한다.
    - 임직원수와 기업규모가 모두 존재하는 경우:
        → "20NN년말 기준, 총 자산 {자산총계}백만원, 자기자본 {자본총계}백만원, 매출액 {매출액}백만원, 영업이익 {영업이익}백만원, 당기순이익 {당기순이익}백만원을 시현한 {임직원수}명의 {기업규모}임."
    
    - 임직원수만 존재하는 경우:
      → "20NN년말 기준, 총 자산 {자산총계}백만원, 자기자본 {자본총계}백만원, 매출액 {매출액}백만원, 영업이익 {영업이익}백만원, 당기순이익 {당기순이익}백만원을 시현한 임직원수 {임직원수}명 규모의 기업임."
    
    - 기업규모만 존재하는 경우:
      → "20NN년말 기준, 총 자산 {자산총계}백만원, 자기자본 {자본총계}백만원, 매출액 {매출액}백만원, 영업이익 {영업이익}백만원, 당기순이익 {당기순이익}백만원을 시현한 {기업규모}임."
    
    - 임직원수와 기업규모가 모두 없는 경우:
      → 기본형 "20NN년말 기준, 총 자산 {자산총계}백만원, 자기자본 {자본총계}백만원, 매출액 {매출액}백만원, 영업이익 {영업이익}백만원, 당기순이익 {당기순이익}백만원을 시현함."

    ### 2) 비재무 구성 규칙
    - 재무정보가 없는 경우 아래 문장으로 작성한다.
      → 재무정보가 없는 경우 1단계 기본정보 문장 형식을 유지하여 마침표로 종결한다.
    - 설립년월일이 없으면 해당 위치에서 제거한다.
    - 주소가 없으면 "[주소]에 위치함" 구문 전체를 제거한다.

    ### 3) 필드 제거 규칙 (세트 제거)
    - 값이 NULL인 항목은 해당 값만 제거
    - 설립년월일 NULL → 해당 값만 제거
    - 주소 NULL → ", [주소]에 위치한" 구문만 제거
    - 임직원수 NULL → 관련 표현만 제거
    - 기업규모 NULL → 관련 표현만 제거

    ### 4) 구문 규칙
    - "시현한", "시현함" 표현은 반드시 유지하며 다른 표현으로 대체하지 않는다.
    - 기업규모는 반드시 "외감 또는 비외감 + 중소 또는 중견 또는 대기업" 형식을 만족해야 하며, 형식을 만족하지 못하면 NULL로 간주한다.

    ### 5) 예외 처리
    - 데이터 부족으로 위 규칙 적용이 불가능한 최소 상황(기업명, 업종만 존재) 시:
      → "{기업이름}는/은 {업종}을 목적으로 설립된 기업임."

    - corpus_presets의 정보만 존재하는 경우:
      → 1문단만 출력한다.

    ## 2. 2문단(기업의 주요 특징) 작성 규칙(회사 개요 특화, 엄수)
    - 제목 없이 줄글 형태로 작성
    - 회사의 주력사업 및 주요 제품 등 핵심 내용을 포함
    - 나열이 과도해지면 핵심 1~3개 범주만 제시하고 나머지는 "등"으로 축약
    - 1문단에서 사용된 업종 또는 사업내용과 동일하거나 유사한 표현은 2문단에서 반복 작성 금지
    - 2문단은 1문단에 없는 추가 정보(제품, 기술, 공급 대상, 사업 확장 등)만 작성
    - 추가 정보가 없는 경우 2문단은 생략 가능

    ## 3. 작성 절차
    1) 참고 문서에서 필요한 정보 추출(필드 스키마 기반, 값 없으면 NULL)
    2) 기업이름 없으면 "생성 불가" 문구 출력 후 종료
    3) 재무 데이터(use_available_data)에 최신 값 있으면 재무 포함, 없으면 재무 제외
    4) 1문단은 템플릿에 따라 누락 항목(NULL)이 있으면 자연스럽게 제외해 문장 작성
    5) 2문단은 주력사업 등만 핵심적으로 1~2문장 요약 
    6) 작성된 문단에 한해 출처 문서ID 부착(1문단: [^Dx][^Dy], 2문단: [^Dx])

    ## 4. 최종 검증 체크리스트(반드시 수행)
    - 출력은 1~2문단이며, 2문단은 주력사업 정보가 없거나 부족하면 2문단 자체를 생략 가능
    - 재무가 없는데 재무 문장이 포함되지 않았는지 확인
    - 2문단의 마침표 문장 종결이 명사형인지 확인 (1문단은 템플릿 종결 어미 유지)
    - 단위/공백 규칙(항목-숫자 한칸, 숫자-단위 공백없음, 백만원 정수) 준수 확인

credit_main:
  topic: 여신 본건
  area: 영업점장의견
  required: true
  use_for_opinion: true
  base_keywords: []
  corpus_presets:
    - required_input
    - required_input_cl
  requirements: ''
  parser: credit_main
  parser_config:
    metadata_root: "_file_metadata"
    append_reference: true
    remarks_line_separator: " / "
    ln_apc_dv_cd_increase: ["21", "30"]
    ln_apc_dv_cd_decrease: ["14", "15", "22", "24", "31", "32"]
  # TODO(P6): 상세 파싱 구현 시 아래 _requirements_spec 참조 (LLM 경로 미사용)
  _requirements_spec: |
    ## 산출물 구조(고정)
    - 반드시 아래 두 문단을 순서대로 구분하여 출력
      1) 1문단: 여신 기본 문장(줄글)
      2) 2문단: 1개의 markdown table: 본건 요약 정리 표
    - 제목, 번호, 설명 문구 없이 그대로 출력
    - 첫 문단과 표 사이에는 줄바꿈 1회만 허용

    ## 1문단 작성 규칙(여신 기본 문장, 고정 문장)
    - 문장은 아래 문장 형식을 그대로 사용할 것
      "본건 {여신과목(여신종류)} {금액} {신규/연장 구분} {기한} 신청 건임."
    - "여신과목(여신종류)", "금액", "신규/연장 구분", "기한"은 제공받은 데이터를 기준으로 작성하되, 아래 분리/환산/축약 규칙을 우선 적용함
    - 신청 건이 2건 이상이면 각 건마다 주요 항목을 반복하여 작성하되, 시작은 반드시 ①,②,③,④,⑤,...으로 구분하여 출력
      > 각 신청 건은 "① {여신과목(여신종류)} {금액} {신규/연장 구분} {기한}"의 완전한 구조로 반복 작성함
      > 각 신청 건(①,②,③...) 사이에는 반드시 공백 1칸을 둠
      예시1) "본건 {여신과목(여신종류)} {금액} {신규/연장 구분} {기한} 신청 건임."
      예시2) "본건 ① {여신과목(여신종류)} {금액} {신규/연장 구분} {기한} ② {여신과목(여신종류)} {금액} {신규/연장 구분} {기한} 동시 신청 건임."
    - '여신과목(여신종류)'는 제공된 데이터에서 과목명만 추출하여 작성
    - 금액 및 괄호 내 담보 표현은 과목명에 포함하지 않음
    - 단, 상품명 자체의 일부인 괄호 표현은 과목명에 포함할 수 있음
      예) 기업운전자금대출(수출망공급강화금융), 기업운전대(분할상환), 기업운전자금(일시상환), 기업시설자금(분할상환) 등
    - '금액'은 제공된 데이터에 있는 그대로 작성하되, 단위는 백만원으로 환산하여 작성 (예: 9,007,769원 → 9백만원)
    - '신규/연장 구분'은 제공된 데이터에 있는 그대로 작성하되, 여러 건인 경우 각 건마다 작성 (예: ① 신규, ② 재약정)
    - '기한'은 반드시 아래 [기한 추출 절차]에 따라 생성된 1문단용 축약 기한 값을 사용
      - 1문단용 기한은 신규/신규 외 여부와 무관하게 반드시 기간값만 사용한다.
      - 1문단용 기한에는 과목명, 날짜, "취급 후", "~", "까지", 괄호 외 설명을 포함하지 않는다.
        > 예) "취급 후 6개월" → "6개월", "~'26.11.15(1년 연장)" → "1년", "~'26.11.15" → 공란
      - 괄호가 포함된 경우, 괄호 내부에서 기간(N년, NN개월)을 우선 추출하여 사용
        > 괄호가 없고 날짜만 존재하는 경우, 해당 날짜에 대응되는 기간 정보가 있으면 이를 사용하고, 없으면 날짜는 제거
      - "재약정", "연장", "신규" 등의 표현은 {신규/연장 구분}에서 이미 사용되므로 기한에서는 제거
      - 1문단의 기한은 항상 기간 값만 사용 (예: 1년, 12개월)
         > 날짜(~'26.11.15 등)는 반드시 제거
         > '취급 후' 등의 표현은 표에서만 사용
      - 여러 건일 경우 마지막에는 "동시 신청 건임."으로 마무리

    ## 기한 추출 절차(준수)
    - 각 신청 건의 "대출기간/상환방식" 값을 먼저 "/" 기준으로 1회만 분리한다.
      > 이때 "/" 앞부분에 과목명이 선행하는 경우, 해당 신청 건의 과목명과 완전히 일치하는 선행 문자열은 제거한 뒤 기한 추출에 사용한다.
      > 예) "기업운전대(일시) 취급 후 6개월 / 분할상환 月 50백만원" → 앞부분 원문은 "취급 후 6개월"로 정리
    - "/" 앞부분 원문을 먼저 확보한다.
      - 1문단용 기한은 아래와 같이 별도로 생성한다.
        1) "/" 앞부분에서 기간 표현(N년, NN개월)을 우선 추출한다.
        2) 괄호가 있으면 괄호 내부의 기간 표현을 우선 사용한다.
        3) 날짜만 있고 기간 표현이 없으면 1문단용 기한은 공란으로 둔다.
        4) 1문단용 기한에는 과목명, 날짜, "취급 후" 등의 표현을 남기지 않는다.
      - 표용 기한은 아래와 같이 별도로 생성한다.
        1) 신규 건 → "취급 후 {기간값}" 형태로 생성
        2) 신규 외 건 → "/" 앞부분 원문 그대로 사용
        3) 단, "/" 앞부분에 선행 과목명이 있으면 제거한 뒤 사용한다.
        4) 날짜와 괄호 내 기간 표현이 함께 있으면 둘 다 유지한다.
        5) 날짜만 있고 기간 표현이 없어도 표용 기한에는 그대로 사용할 수 있다.
    - "/" 뒷부분 = 표의 비고 원문
    - "/"가 없으면 전체 값을 표의 기한으로 사용하고, 비고는 공란 처리한다.
    - 괄호가 열렸으면 닫는괄호까지 반드시 포함한다.
    - 표에 사용할 기한 값은 별도로 생성한다.
      1) 신규 건 → "취급 후 {기간값}" 형태로 생성
      2) 신규 외 건 → "/" 앞부분 원문 그대로 사용 (과목명 제외)

    ## 2문단: 본건 요약 정리 표(markdown table, 고정 스키마)
    - 반드시 markdown table 형식으로 작성
    - 컬럼명은 아래 순서를 그대로 사용할 것
      | 거래구분 | 과목 | 금액 | 기한 | 담보 | 신용 | 보증인 | 비고 |
    - 2건 이상의 신청 건이 포함된 경우 내용을 합치지 않고 개별 건으로 작성
    - 확인되지 않은 컬럼 값은 공란으로 두고 임의로 작성하지 말 것
    - 표의 모든 정보는 참조 문서에 근거한 내용만 사용 (금액은 백만원/천미불 단위로 작성)
    - 거래구분: {신규/연장 구분}을 그대로 작성
    - 과목: {여신과목(여신종류)}을 그대로 작성
    - 금액: {금액}을 백만원 단위로 환산하여 작성 (예: 9,007,769원 → 9백만원)
    - 기한: [기한 추출 절차]에 따라 생성된 값을 사용하여 작성함
    - 담보: 다음 우선순위에 따라 작성
      1) '여신과목(여신종류)'에 포함된 담보 표현 우선 사용
        > 하나의 신청 건에 담보가 2개 이상인 경우에만, 각 담보 앞에 "①,②,..." 등을 추가하여 한 셀에 작성 (1건일 경우 숫자 표기 금지)
      2) '채권보전방안'에 명시된 담보 정보가 있을 경우 사용
        > 핵심 내용만 사용
    - 신용: 
      - 별도의 신용공여 또는 여신과목(여신종류)의 '신용' 표현이 확인되는 경우에만 작성하며, 확인되지 않으면 공란으로 둠
      - 담보 설정 금액(근저당권 설정 금액 등)은 신용으로 작성하지 않음
      - 여신과목(여신종류)에 '신용'이 포함된 경우, 신용 컬럼에 금액 전액을 기입
      - 명확한 신용 금액이 없을 경우 공란 처리
      - 담보와 신용은 상호 배타적으로 해석하지 않으며, 각각의 근거가 확인되면 동시에 기입할 수 있음
    - 보증인: 채권보전방안 내용 중 연대입보, 보증, 연대보증 표현이 있으면 해당 인명을 추출하여 기입한다.
      > 공통으로 제시된 보증인 정보는 해당되는 모든 신청 건의 행에 반복 기재한다.
    - 비고: 반드시 [기한 추출 절차]에서 확정된 '표의 비고 원문'을 기반으로 작성함
      > 예시: 분할상환 月 50백만원 → '매월 50백만원 상환'으로 표기

    ## 작성 절차(참고)
      1) 참고 문서에서 신청 건별로 {신규/연장 구분}, {여신과목(여신종류)}, {대출기간/상환방식}, {채권보전방안}을 서로 대응시켜 확인
        1-1) '여신과목(여신종류)'에 과목명, 금액, 괄호 내 담보 표현이 함께 포함된 경우 이를 먼저 분리함
        1-2) 금액이 한글 표현일 경우 [한글 금액 변환 절차]를 먼저 수행
      2) "대출기간/상환방식"을 '/' 기준으로 분리하여 기한/비고를 사용
      3) 1문단용 기한은 기간 값(N년, NN개월)만 추출하여 생성하고, 표용 기한은 신규/신규 외 규칙에 따라 별도로 생성
      4) 1문단을 고정 문장으로 작성(값은 확인된 범위에서만 채움)
      5) 표 스키마(컬럼 고정)에 맞춰 값 채움(확인 불가 값은 공란)
      6) 출처키는 1문단의 마지막 문장 뒤에 부착. 그리고 2문단의 경우 마지막 행 뒤에 두 번 줄바꿈(\n\n) 후 출처키 부착(공통 규칙 준수)

    ## 복수건 매핑 규칙
    - 번호가 있는 항목은 반드시 같은 번호끼리 매칭한다.
      예) 여신과목 1 ↔ 신규/연장 구분 1 ↔ 대출기간/상환방식 1 ↔ 채권보전방안 1
    - 번호가 없는 공통 담보 정보가 특정 복수 건(예: 2,3.)에 적용된 경우, 해당 번호의 각 행에 동일하게 반복 기재한다.
    - 번호가 불명확하면 임의 매핑하지 말고 줄바꿈을 기준으로 매핑한다.

    ## 단위 규칙
    - 금액 단위가 '원' 또는 '천원'인 경우, 반드시 '백만원' 단위로 환산하여 작성
    - 환산 절차
      1) '원' 금액은 1,000,000으로 나눔.
      2) '천원' 금액은 1,000으로 나눔.
      3) 최종 결과에만 '백만원' 단위를 붙임.
    - 숫자 값에 단위만 변경하는 방식의 환산은 절대 허용하지 않음.
    - 환산 예시
      - 9,007,769원 → 9백만원
      - 9,007,769천원 → 9,008백만원
      - 1,552,230천원 → 1,552백만원
      - 2,143,355,620원 → 2,143백만원

    ## 금액 단위 고정 등식
    - 1억 = 100백만원
    - 0.1억 = 1천만 = 10백만원
    - 0.01억 = 1백만
    - 이미 '백만원' 단위로 제공된 금액은 재환산·재계산·자리 변경 금지. 소수점일 경우 그대로 사용.

    ## 최종 검증 체크리스트(참고)
    - 출력이 정확히 두 문단(1문단 + 표 문단 1개)인지 확인
    - 첫 문단과 표 사이 줄바꿈이 정확히 1회인지 확인
    - 1문단 고정 문장이 변형되지 않았는지 확인
    - 표 컬럼명이 고정 스키마와 동일한지 확인
    - 확인되지 않은 값이 임의로 채워지지 않고 공란 처리됐는지 확인
    - 금액 단위가 원화=백만원, 달러=천미불로 작성되었는지 확인
    - 출처키가 허용 위치("문단 끝"/"표 마지막 행 두 번 개행(\n\n) 후")만 사용되고 정규형([^D..][^D..])인지 확인


industry_status:
  topic: 산업 현황
  area: 영업점장의견
  required: true
  use_for_opinion: true
  base_keywords:
    - 산업의 특성(진입장벽, 성장, 추세)
    - 산업의 국내외 시장여건
    - 경쟁 업체
  # file_type 기반 검색 정책 (문서 서비스가 corpus_hash_key -> file_type 조회를 지원할 때만 적용됨)
  # - deny_file_types: 해당 토픽에서 사용 금지할 file_type 목록
  # - if_all_denied: 검색 결과가 전부 deny일 때 처리 ("force_placeholder"면 CONTENT_NOT_AVAILABLE 유도)
  # - else_behavior: deny와 허용이 섞여 있을 때 처리 ("exclude_denied"면 deny만 제외 후 검색)
  file_type_policy:
    deny_file_types: ["감사보고서"]
    if_all_denied: "force_placeholder"
    else_behavior: "exclude_denied"
  # 검색 결과가 비거나(CONTENT_NOT_AVAILABLE 포함) 생성 결과가 플레이스홀더일 때
  # 보조 코퍼스로 폴백한다. 기본 정책은 두 트리거 모두 true.
  search_fallback:
    enabled: true
    corpus_keys:
      - industry_trends
    when_no_valid_documents: true
    when_llm_content_not_available: true
  requirements: |
    ## 산출물 구조(고정)
    - 제목 없이 줄글 3~4문장으로만 작성
    - 회사의 매출액 등은 언급하지 말 것

    ## 포함해야 할 내용
    - 아래 항목은  '가능한 범위 내 포함'이며, 참고 문서/데이터에 근거가 없는 항목은 언급하지 않음(추정 금지).
      - 영위하는 산업의 전반적인 현황 및 트렌드
      - 시장 규모 및 성장률
      - 주요 경쟁사 현황
      - 산업의 성장 전망 및 리스크 요인

    ## 작성 절차
    1) 포함해야 할 항목 중 근거가 확인되는 내용만 선별 (모든 내용에 대해 작성할 필요 없이 핵심만 작성)
    2) 3~4문장으로 재구성(과도한 나열 금지, 자연스러운 문장 구조로 연결)
    3) 문단 끝에 출처키 부착(공통 규칙 준수)

    ## 최종 검증 체크리스트(반드시 수행)
    - 제목 없이 줄글 3~4문장인지 확인
    - 회사 매출액 등 회사 고유 재무수치가 포함되지 않았는지 확인
    - 참고 문서/데이터 범위를 벗어난 임의 추가 내용이 없는지 확인
    - 관련된 내용이 참고 문서/데이터에 확실히 포함되지 않았는지 확인
    - 출처키가 문단 끝에만 있고 정규형([^D..][^D..])인지 확인


business_status:
  topic: 영업 현황
  area: 영업점장의견
  required: true
  use_for_opinion: true
  base_keywords:
    - 제품 및 서비스
    - 목적사업 및 신규사업
    - 원재료 수급 및 설비의 생산능력
  corpus_presets:
    - quarterly_sales_status
    - major_supplier_status
    - major_customer_status
    - sales_by_item_status
  use_available_data: true
  requirements: |
    ## 산출물 구조(고정)
    - 제목 없이 줄글 4~5문장으로 작성
    - 위 내용 중 핵심만 작성하고, 과도한 나열은 금지(자연스러운 문장 구조로 축약/연결)
    - 중요: '영업 현황'은 ‘하나의 문단’으로 출력하고, 문장 사이에 줄바꿈(개행)을 절대 넣지 말 것
      (즉, 종합 결론 영역에서는 Enter 금지, 문장들은 띄어쓰기 한 칸으로만 연결)

    ## 숫자 정보 사용 원칙(엄수)
    - 검색 문서 중 "연결재무제표 주석" 및 "사업의 내용"에서 가져온 숫자정보는 절대 사용하지 않음
    - 숫자 정보는 "참고 데이터"를 기본으로 활용하며, 검색 문서에서는 텍스트 부분에서 취득한 정보만 사용
      > 참고 데이터: {매출액}, {매출원가율}, {영업이익}, {영업외수익}, {당기순이익}, {현금영업이익}
      > 참고 데이터는 별도 제공되므로 검색 결과 검증/재계산/추정 금지
      > {매출원가율}은 변동에 의해 얼마만큼의 차이가 생겼는지 작성

    ## 입력 데이터 유연 대응 규칙(필수)
    - 입력 데이터(기업/심사보고서, 재무데이터, 매입/매출처별 현황)가 일부 또는 전부 누락될 수 있음.
    - 제공된 데이터 범위 내에서만 작성하며, 없는 정보는 추정하거나 보완 생성하지 않음.
    - 데이터가 제한적인 경우, 확보 가능한 정보 중심으로 자연스럽게 축약하여 작성할 것.
      > 예: 매출 데이터만 있는 경우 → 매출 추이 및 영업 전망 중심으로 작성
      > 예: 매입/매출처 정보 없는 경우 → 해당 내용 언급 없이 매출 흐름 중심으로 작성
    - 모든 데이터가 없는 경우 → "확인 가능한 영업 관련 정보가 제한적인 상태임" 수준에서 최소한으로 작성

    ## 대상 기업 식별 및 정보 필터링 규칙(엄수)
    - 반드시 '심사 대상 기업(차주)' 기준으로만 작성할 것.
    - 다음에 해당하는 정보는 모두 제외:
      · 종속회사(자회사), 모회사, 관계회사, 계열회사 등의 영업활동
      · 연결 기준 설명, 그룹 전체 실적, 타 법인 기준 매출/사업 내용
    - 회사명이 복수 등장할 경우, 반드시 '심사 대상 기업명'과 일치하는 정보만 사용
    - "연결", "종속회사", "계열", "자회사", "모회사" 등의 키워드가 포함된 문장은 원칙적으로 제외
    - 단일 회사 기준으로 명확히 식별 가능한 정보만 활용하여 작성

    ## 작성 안정성 보정 규칙
    - 특정 데이터(매출/거래처 등)가 일부만 존재하더라도, 문장 간 불균형 없이 자연스럽게 연결할 것
    - 동일 유형 정보가 부족할 경우, 다른 확보된 정보(매출 추이 등)로 보완하여 최소 4문장 구성 유지

    ## 작성 원칙 (참고 데이터 + 참고 문서 기반)
    - 아래 항목은 '가능한 범위 내 포함'이며, 참고 문서/데이터에 근거가 없는 항목은 언급하지 않음(추정 금지).
      - 판매 품목(제품/서비스) 및 매출액에 대한 기대사항
       > 매입/매출처 내역은 주요 고객/공급업체의 매출액 비중, 거래 기간, 거래 안정성 등을 종합적으로 고려하여 핵심 내용만 작성
          > 예시) "A사에 대한 매출액 비중이 30%로 가장 높으며, 5년 이상 거래가 지속되고 있음. B사는 매출액 비중 20%로 두 번째로 높고, 3년 이상 거래가 이어지고 있음." 등
          > 단, 고객/공급업체 이름은 원문에 있는 그대로 사용
       > 매입/매출처 내역이 불충분한 경우, 해당 내용을 언급하지 않고 매출액 추이 및 기대사항 중심으로 작성
       > 매입/매출처 내역이 충분히 확인되는 경우에도 과도한 나열은 피하고 핵심적인 내용만 작성
      - 매출액 추이는 단순히 수치 나열은 하지 말 것
      - 단년도 또는 직전연도 대비 변화만으로는 추세 표현 사용 금지
      - 조건을 만족하지 않는 경우에는 "증가", "감소", "개선", "축소" 등 단순 변화 표현만 사용
      - 영업 상황에 대한 긍정적 예상

    ## 문장 구성 및 출력 구조 규칙
    - 은행 직원이 작성하는 친절한 보고서 문체 사용. 매끄러운 연결어를 활용한 자연스러운 읽기 쉬운 문장 구성.
      > 예시: ~고 판단됨., ~로 판단됨., ~것으로 전망됨. 등
    - 길이가 짧은 문장들은 "~하며, ~고, ~으며" 등 연결어미 적절히 사용
      > 예시: ~를 확보하였으며, ~기대되며, ~하며, ~으며, ~며, ~내며, 했고, ~하고 등
    - 괄호보다는 풀어서 설명하는 문장 구성 선호.
    - 한 문장에 숫자 3개 이상을 단순 나열하지 말고, 숫자는 원인 또는 결과 설명에 필요한 범위에서만 사용할 것.

    ## 작성 절차
    1) 참고 데이터에서 매출/추이 관련 핵심 포인트를 추출(검증/추정/재계산 금지)
    2) 문서 근거 범위에서 자재 수급 방식 및 영업 전망(긍정 요인)을 정리
    3) 체크리스트를 4~5문장으로 자연스럽게 연결하여 작성 (명사형 종결어미로 작성하고 마침표 포함)
    4) 문단 끝에 출처키 부착(공통 규칙 준수)

    ## 최종 검증 체크리스트(반드시 수행)
    - 제목 없이 줄글 4~5문장인지 확인
    - 금지된 출처("연결재무제표 주석", "사업의 내용")의 숫자정보를 사용하지 않았는지 확인
    - 숫자정보가 필요한 경우 참고 데이터 기반으로만 사용했는지 확인
    - 한 문장 내 명사형 종결 중복이 없는지 확인
    - 출처키가 문단 끝에만 있고 정규형([^D..][^D..])인지 확인

financial_status:
  topic: 재무 현황
  area: 영업점장의견
  required: true
  use_for_opinion: true
  processing_mode: financial
  base_keywords: []
  subtasks:
    - risk_E                 # test E
  use_available_data: true
  requirements: |
    ## 산출물 구조(최우선)
    - 반드시 아래 두 가지를 순서대로 출력
      1) 1문단: 줄글 4~5문장(문장 사이 개행 금지)
      2) 2문단: '-' 개조식 3~4항목
    - 개조식은 연도를 반드시 "20NN년" 형태로 명시한다.
    - 시스템이 선행 제공한 요약표 외에 표/테이블을 추가로 출력하지 않는다.

    ## 단위·변화 표기 규칙
    - 1문단 및 subtask 초안에서는 금액 지표의 증감률(%)·%p 표기를 금지한다.
    - 1문단 및 subtask 초안의 금액 변화는 백만원 절대차/규모 변화로만 서술한다.
    - 2문단 개조식은 금액 항목에 한해 `(±N백만원, ±N%)` 표기를 허용한다.
    - 비율 항목 변화는 %p만 사용하며, 변화비율(%)은 사용하지 않는다.

    ## 2문단 형식: 아래 형식을 그대로 따를 것. (단, '[금액 항목]', '[비율 항목]'은 출력하지 않음.)
      - [금액 항목] 항목명 증가/감소: 직전연도 수치 → 최근연도 수치 (변화금액, 변화비율) / 지표에 대해서만 아주 간략히 설명
      - [비율 항목] 항목명 증가/감소: 직전연도 수치 → 최근연도 수치 (%p 증감) / 지표에 대해서만 아주 간략히 설명
  summary_table_columns:
    - display_name: 총자산
      data_key: 자산총계
      unit: 백만원
    - display_name: 자기자본
      data_key: 자본총계
      unit: 백만원
    - display_name: 매출액
      data_key: 매출액
      unit: 백만원
    - display_name: 영업이익
      data_key: 영업이익
      unit: 백만원
    - display_name: 순이익
      data_key: 당기순이익
      unit: 백만원
    - display_name: EBITDA
      data_key: EBITDA
      unit: 백만원
    - display_name: 유형자산
      data_key: 유형자산
      unit: 백만원
    - display_name: 현금예금
      data_key: 총현금예금
      unit: 백만원
    - display_name: 총차입금
      data_key: 총차입금
      unit: 백만원
    - display_name: 이자비용
      data_key: 이자비용
      unit: 백만원
    - display_name: 부채비율
      data_key: 부채비율
      unit: "%"
