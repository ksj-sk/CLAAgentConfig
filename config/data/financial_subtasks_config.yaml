    차입금 비중:
      formula: 총차입금 / 부채총계 * 100
      sources:
      - 총차입금
      - 부채총계
      description: 부채 중 금융성 부채 비율
    Net Debt:
      formula: 총차입금 - 총현금예금
      sources:
