    매출채권/매출액 비율:
      formula: 매출채권 / 매출액 * 100
      sources:
      - 매출채권
      - 매출액
      description: 외상매출 의존도
    매출액증가율:
      formula: null
      sources:
      - 매출액증가율
      description: 성장률 비교로 효율성 판단
    총자산증가율:
      formula: null
      sources:
