      description: 영업이익이 이자비용을 얼마나 커버하는지 보여주는 지표로, 1.5~3배 이상이면 안정적
    DSCR:
      formula: (영업활동현금흐름 + 이자비용) / (이자비용 + 원리금상환액)
      sources:
      - 영업활동현금흐름
      - 이자비용
      - 원리금상환액
      description: 현금창출로 부채상환 가능성
    Cash Flow to Debt:
      formula: 영업활동현금흐름 / 부채총계
      sources:
      - 영업활동현금흐름
      - 부채총계
      description: 부채 대비 현금창출 비율
    차입금/EBITDA:
      formula: 총차입금 / EBITDA
      sources:
      - 총차입금
      - EBITDA
      description: 차입금 상환 기간 추정
    금융비용부담율:
      formula: 이자비용 / 매출액 * 100
      sources:
      - 이자비용
      - 매출액
      description: 매출 대비 이자비용 부담
    영업활동현금흐름:
      formula: null
      sources:
      - 영업활동현금흐름
      description: 본업 현금창출력
    EBITDA:
      formula: null
      sources:
      - EBITDA
      description: ''

business_performance:
  name: 수익성 + 성장
  metrics:
    매출총이익률:
      formula: 매출총이익 / 매출액 * 100
      sources:
